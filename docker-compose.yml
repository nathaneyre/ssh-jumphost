services:
  ssh-jumphost:
    build: .
    configs:
      - source: authorized_keys
        target: /run/secrets/authorized_keys
      - source: jumphost_ssh_key
        target: /run/secrets/jumphost_ssh_key
      - source: jumphost_ssh_key_pub
        target: /run/secrets/jumphost_ssh_key.pub
      - source: ssh_key_repo
        target: /run/secrets/ssh_key_repo
    environment:
      - DEBUG
    ports:
      - "${SSH_PORT:-2223}:22"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/.ssh/authorized_keys:/root/.ssh/authorized_keys:ro
      - ./router.sh:/usr/local/bin/router:ro
      - ./authorized-keys-lookup:/usr/local/sbin/authorized-keys-lookup:ro
    restart: unless-stopped
    networks:
      - dokploy-network
      - default

configs:
  authorized_keys:
    file: /root/.ssh/authorized_keys
  jumphost_ssh_key:
    file: /root/.ssh/jumphost_ssh_key
  jumphost_ssh_key_pub:
    file: /root/.ssh/jumphost_ssh_key.pub
  ssh_key_repo:
    content: |
      ${SSH_KEY_REPO:-git@github.com:nathaneyre/ssh-authorized-keys.git}

networks:
  dokploy-network:
    external: true